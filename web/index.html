<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icon.png" />
    <meta
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover"
      name="viewport"
    />
    <title>Imagor Studio</title>
    <script>
      ;(() => {
        const root = document.documentElement
        const bootstrap = window.__IMAGOR_STUDIO_BOOTSTRAP__
        const applyTheme = (resolvedTheme) => {
          root.classList.remove('light', 'dark')
          root.classList.add(resolvedTheme)
          root.style.colorScheme = resolvedTheme
        }

        if (bootstrap?.bootMode === 'minimal') {
          root.classList.add('boot-minimal')
        }

        try {
          const storedTheme = window.localStorage.getItem('theme')
          const theme =
            storedTheme === 'light' || storedTheme === 'dark' || storedTheme === 'system'
              ? storedTheme
              : 'system'
          const resolvedTheme =
            theme === 'system'
              ? window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light'
              : theme

          applyTheme(resolvedTheme)
        } catch {
          applyTheme('light')
        }
      })()
    </script>
    <style>
      :root {
        --boot-background: hsl(0 0% 100%);
        --boot-stroke: rgba(17, 17, 17, 0.78);
      }

      .dark {
        --boot-background: hsl(240 10% 3.9%);
        --boot-stroke: rgba(255, 255, 255, 0.82);
      }

      html,
      body,
      #root {
        height: 100%;
        margin: 0;
        background: var(--boot-background);
      }

      body {
        color: inherit;
      }

      .boot-splash {
        box-sizing: border-box;
        display: grid;
        min-height: 100%;
        place-items: center;
        padding: 24px;
      }

      .boot-minimal .boot-splash {
        display: none;
      }

      .boot-logo {
        width: 108px;
        height: 108px;
        color: var(--boot-stroke);
        overflow: visible;
      }

      .boot-logo .boot-spinner {
        stroke-dasharray: 22 78;
        stroke-dashoffset: 0;
        animation: boot-spin 1.05s linear infinite;
      }

      @keyframes boot-spin {
        to {
          stroke-dashoffset: -100;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .boot-logo .boot-spinner {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div aria-label="Loading Imagor Studio" class="boot-splash" role="status">
        <svg
          aria-hidden="true"
          class="boot-logo"
          fill="none"
          viewBox="0 0 512 512"
          xmlns="http://www.w3.org/2000/svg"
        >
          <g stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="16">
            <path
              class="boot-spinner"
              d="M168 96H344C383.765 96 416 128.235 416 168V344C416 383.765 383.765 416 344 416H168C128.235 416 96 383.765 96 344V168C96 128.235 128.235 96 168 96Z"
              pathLength="100"
            />
            <path d="M187 325L325 187" />
          </g>
        </svg>
      </div>
    </div>
    <script src="/src/main.tsx" type="module"></script>
  </body>
</html>
