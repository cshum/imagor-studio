extend type Query {
  # Imagor Configuration APIs
  imagorStatus: ImagorStatus!
}

extend type Mutation {
  # Imagor Configuration APIs (admin only)
  configureEmbeddedImagor: ImagorConfigResult!
  configureExternalImagor(input: ExternalImagorInput!): ImagorConfigResult!

  # Imagor URL Generation API
  generateImagorUrl(imagePath: String!, params: ImagorParamsInput!): String!

  # Imagor URL Generation from editor state (consolidates convertStateToGraphQLParams logic in backend)
  generateImagorUrlFromEditorState(
    imagePath: String!              # Root image path
    stateJson: String!              # JSON-encoded ImageEditorState (full base state)
    originalDimensions: DimensionsInput! # Root image original dimensions
    contextPath: [String!]          # Layer ID path for f-token parent-dim resolution ([] = root)
    forPreview: Boolean             # Adds preview/webp filters, scales blur/sharpen/padding
    previewMaxDimensions: DimensionsInput # Null = no preview constraint
    skipLayerId: String             # Layer ID to exclude from rendering
  ): String!
}

# Imagor URL Generation Input Types
input ImagorParamsInput {
  # Dimensions
  width: Int
  height: Int

  # Cropping
  cropLeft: Float
  cropTop: Float
  cropRight: Float
  cropBottom: Float

  # Fitting
  fitIn: Boolean
  stretch: Boolean

  # Padding
  paddingLeft: Int
  paddingTop: Int
  paddingRight: Int
  paddingBottom: Int

  # Flipping
  hFlip: Boolean
  vFlip: Boolean

  # Alignment
  hAlign: String # "left", "right"
  vAlign: String # "top", "bottom"
  # Smart crop
  smart: Boolean

  # Trimming
  trim: Boolean
  trimBy: String # "top-left", "bottom-right"
  trimTolerance: Int

  # Filters
  filters: [ImagorFilterInput!]
}

input ImagorFilterInput {
  name: String! # "quality", "brightness", etc.
  args: String! # "80", "10", etc.
}

# Dimensions input (width + height)
input DimensionsInput {
  width: Int!
  height: Int!
}

# Imagor Configuration Types
type ImagorStatus {
  configured: Boolean!
  mode: ImagorMode
  restartRequired: Boolean!
  lastUpdated: String
  isOverriddenByConfig: Boolean!
  externalConfig: ExternalImagorConfig
}

type ExternalImagorConfig {
  baseUrl: String!
  hasSecret: Boolean!
  unsafe: Boolean!
  signerType: ImagorSignerType!
  signerTruncate: Int!
}

type ImagorConfigResult {
  success: Boolean!
  restartRequired: Boolean!
  timestamp: String!
  message: String
}

input ExternalImagorInput {
  baseUrl: String!
  secret: String
  unsafe: Boolean
  signerType: ImagorSignerType # Optional, defaults to SHA1
  signerTruncate: Int # Optional, defaults to 0
}

enum ImagorSignerType {
  SHA1
  SHA256
  SHA512
}

enum ImagorMode {
  EMBEDDED
  EXTERNAL
}
