type Query {
  listFiles(
    path: String!
    spaceID: String
    offset: Int
    limit: Int
    onlyFiles: Boolean
    onlyFolders: Boolean
    extensions: String
    showHidden: Boolean
    sortBy: SortOption
    sortOrder: SortOrder
  ): FileList!

  statFile(path: String!, spaceID: String): FileStat

  # Storage Configuration APIs
  storageStatus: StorageStatus!
}

type Mutation {
  # write scope required
  uploadFile(path: String!, spaceID: String, content: Upload!): Boolean!
  requestUpload(
    path: String!
    spaceID: String
    contentType: String!
    sizeBytes: Int!
  ): PresignedUpload!
  deleteFile(path: String!, spaceID: String): Boolean!
  createFolder(path: String!, spaceID: String): Boolean!
  copyFile(sourcePath: String!, destPath: String!, spaceID: String): Boolean!
  moveFile(sourcePath: String!, destPath: String!, spaceID: String): Boolean!

  # Template management (write scope required)
  saveTemplate(input: SaveTemplateInput!, spaceID: String): TemplateResult!
  regenerateTemplatePreview(templatePath: String!, spaceID: String): Boolean!

  # Storage Configuration APIs (admin only)
  configureFileStorage(input: FileStorageInput!): StorageConfigResult!
  configureS3Storage(input: S3StorageInput!): StorageConfigResult!
  testStorageConfig(input: StorageConfigInput!): StorageTestResult!
  beginStorageUploadProbe(
    input: StorageConfigInput!
    contentType: String!
    sizeBytes: Int!
  ): StorageUploadProbe!
  completeStorageUploadProbe(
    input: StorageConfigInput!
    probePath: String!
    expectedContent: String!
  ): StorageTestResult!
}

type FileList {
  items: [FileItem!]!
  totalCount: Int!
}

type FileItem {
  name: String!
  path: String!
  size: Int!
  isDirectory: Boolean!
  modifiedTime: String!
  thumbnailUrls: ThumbnailUrls
}

type ThumbnailUrls {
  grid: String
  preview: String
  full: String
  original: String
  meta: String
}

type FileStat {
  name: String!
  path: String!
  size: Int!
  isDirectory: Boolean!
  modifiedTime: String!
  etag: String
  thumbnailUrls: ThumbnailUrls
}

enum SortOption {
  NAME
  SIZE
  MODIFIED_TIME
}

enum SortOrder {
  ASC
  DESC
}

scalar Upload

# Storage Configuration Types
type StorageStatus {
  configured: Boolean!
  supportsPresignedUpload: Boolean!
  type: String
  lastUpdated: String
  isOverriddenByConfig: Boolean!
  fileConfig: FileStorageConfig
  s3Config: S3StorageConfig
}

type PresignedUpload {
  uploadURL: String!
  expiresAt: String!
}

type FileStorageConfig {
  baseDir: String!
  mkdirPermissions: String!
  writePermissions: String!
}

type S3StorageConfig {
  bucket: String!
  region: String
  endpoint: String
  forcePathStyle: Boolean
  baseDir: String
}

type StorageConfigResult {
  success: Boolean!
  timestamp: String!
  message: String
}

type StorageTestResult {
  success: Boolean!
  message: String!
  details: String
  code: String
}

type StorageUploadProbe {
  probePath: String!
  uploadURL: String!
  expiresAt: String!
}

input StorageConfigInput {
  type: StorageType!
  fileConfig: FileStorageInput
  s3Config: S3StorageInput
}

input FileStorageInput {
  baseDir: String!
  mkdirPermissions: String
  writePermissions: String
}

input S3StorageInput {
  bucket: String!
  region: String
  endpoint: String
  forcePathStyle: Boolean
  accessKeyId: String
  secretAccessKey: String
  sessionToken: String
  baseDir: String
}

enum StorageType {
  FILE
  S3
}

# Template Types
input SaveTemplateInput {
  name: String!
  description: String
  dimensionMode: DimensionMode!
  templateJson: String!
  sourceImagePath: String!
  savePath: String!
  overwrite: Boolean
  # previewParams removed: backend now derives preview from templateJson.transformations
}

enum DimensionMode {
  ADAPTIVE
  PREDEFINED
}

type TemplateResult {
  success: Boolean!
  templatePath: String!
  previewPath: String
  message: String
}
